<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Confirmation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #0b1220 0%, #121826 45%, #1a2338 100%);
            color: #f8fafc;
        }
        .card-shell {
            background: rgba(7, 12, 22, 0.82);
            border: 1px solid rgba(212, 175, 55, 0.24);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(14px);
        }
        .brand {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            letter-spacing: 0.08em;
        }
        .muted {
            color: rgba(248, 250, 252, 0.7);
        }
        .btn-gold {
            background: linear-gradient(135deg, #d4af37, #b8891f);
            border: 0;
            color: #10131a;
            font-weight: 700;
        }
        .btn-gold:hover {
            color: #10131a;
            opacity: 0.95;
        }
        .email-pill {
            display: inline-block;
            padding: 0.65rem 1rem;
            border-radius: 999px;
            background: rgba(212, 175, 55, 0.14);
            border: 1px solid rgba(212, 175, 55, 0.25);
            color: #f9e8b2;
            word-break: break-word;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center px-3 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card-shell p-4 p-md-5 text-center">
                    <div class="mb-3">
                        <div class="brand h2 mb-2">HMS</div>
                        <h1 class="h3 mb-2">Email Confirmation</h1>
                        <p class="muted mb-0">{{ message }}</p>
                    </div>

                    {% if email %}
                    <div class="my-4">
                        <p class="mb-2 muted">Confirmed email address</p>
                        <div class="email-pill">{{ email }}</div>
                    </div>
                    {% endif %}

                    <div class="d-grid gap-3 d-sm-flex justify-content-sm-center mt-4">
                        <a href="{{ url_for('auth.login') }}" class="btn btn-gold px-4">Go to Login</a>
                        <a href="{{ url_for('public.home') }}" class="btn btn-outline-light px-4">Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
