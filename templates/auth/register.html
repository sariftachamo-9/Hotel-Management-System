<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - {{ hotel_name|default('Luxury Hotel') }}</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-navy: #0f172a;
            --accent-gold: #c6a355;
            --light-cream: #faf9f6;
            --text-light: #f1f5f9;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)),
                url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&q=80') center/cover no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            padding: 40px 0;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 40px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border-top: 3px solid var(--accent-gold);
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: white;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .section-heading {
            color: var(--accent-gold);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(198, 163, 85, 0.2);
            padding-bottom: 10px;
        }

        .form-control,
        .form-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 2px;
            padding: 12px 15px;
            margin-bottom: 20px;
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-gold);
            box-shadow: none;
            color: white;
        }

        .form-select option {
            background: var(--primary-navy);
            color: white;
        }

        .form-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
        }

        .btn-luxury {
            background-color: var(--accent-gold);
            color: white;
            border: none;
            padding: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            border-radius: 2px;
            width: 100%;
            transition: all 0.3s;
        }

        .btn-luxury:hover {
            background-color: #b08d44;
            color: white;
            transform: translateY(-2px);
        }

        .links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .links a:hover {
            color: var(--accent-gold);
        }
        /* Fix input and select placeholder visibility */
        .form-control::placeholder, .form-select {
            color: rgba(255,255,255,0.7);
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="d-flex justify-content-center">
            <div class="login-card fade-in">
                <div class="text-center mb-5">
                    <h1 class="brand-title"><i class="bi bi-buildings-fill text-warning me-2"></i>HMS</h1>
                    <p class="text-white-50">Create Your Account</p>
                </div>

                <div id="alertContainer"></div>

                <form id="registerForm">
                    <h6 class="section-heading">Personal Information</h6>
                    <div class="row">
                        <div class="col-md-12 mb-2">
                            <label for="full_name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="full_name" required placeholder="John Doe">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-2">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" required placeholder="name@example.com">
                        </div>
                        <div class="col-md-6 mb-2">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="phone" required placeholder="+977 9800000000">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-2">
                            <label for="id_type" class="form-label">ID Type</label>
                            <select class="form-select" id="id_type" required>
                                <option value="">Select ID Type</option>
                                <option value="citizenship">Citizenship</option>
                                <option value="passport">Passport</option>
                                <option value="driving_license">Driving License</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-2">
                            <label for="id_number" class="form-label">ID Number</label>
                            <input type="text" class="form-control" id="id_number" required placeholder="ID Number">
                        </div>
                    </div>

                    <h6 class="section-heading mt-4">Security</h6>
                    <div class="row">
                        <div class="col-md-6 mb-2">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" required placeholder="••••••••">
                        </div>
                        <div class="col-md-6 mb-2">
                            <label for="confirm_password" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirm_password" required
                                placeholder="••••••••">
                        </div>
                    </div>

                    <h6 class="section-heading mt-4">Additional Details</h6>
                    <div class="row">
                        <div class="col-md-6 mb-2">
                            <label for="nationality" class="form-label">Nationality</label>
                            <input type="text" class="form-control" id="nationality" placeholder="Nepal">
                        </div>
                        <div class="col-md-6 mb-2">
                            <label for="address" class="form-label">Address</label>
                            <input type="text" class="form-control" id="address" placeholder="City, Country">
                        </div>
                    </div>

                    <div class="mt-4 mb-4">
                        <button type="submit" class="btn btn-luxury">
                            Register Now
                        </button>
                    </div>
                </form>

                <div class="text-center links">
                    <p class="mb-0">Already have an account? <a href="/auth/login" class="fw-bold">Login here</a></p>
                </div>
            </div>
        </div>
    </div>

    <script nonce="{{ csp_nonce }}" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script nonce="{{ csp_nonce }}" src="{{ url_for('static', filename='js/security.js') }}"></script>
    <script nonce="{{ csp_nonce }}">
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Processing...';
            btn.disabled = true;

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'danger');
                btn.innerHTML = originalText;
                btn.disabled = false;
                return;
            }

            const formData = {
                full_name: document.getElementById('full_name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                id_type: document.getElementById('id_type').value,
                id_number: document.getElementById('id_number').value,
                password: password,
                nationality: document.getElementById('nationality').value,
                address: document.getElementById('address').value
            };

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCsrfToken()
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    const pendingUrl = data.pending_confirmation_url || '/auth/check-email';
                    showAlert('Registration successful! Please confirm your email address.', 'success');
                    setTimeout(() => {
                        window.location.href = pendingUrl;
                    }, 1200);
                } else {
                    showAlert(data.error || 'Registration failed', 'danger');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                showAlert('An error occurred. Please try again.', 'danger');
                console.error(error);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = '';
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} alert-dismissible fade show bg-${type} text-white border-0`;
            alert.setAttribute('role', 'alert');
            alert.textContent = message;

            const closeButton = document.createElement('button');
            closeButton.type = 'button';
            closeButton.className = 'btn-close btn-close-white';
            closeButton.setAttribute('data-bs-dismiss', 'alert');
            alert.appendChild(closeButton);
            alertContainer.appendChild(alert);
        }
    </script>
</body>

</html>
