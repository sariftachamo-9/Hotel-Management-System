{% extends 'base.html' %}
{% block title %}Booking Confirmed{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="alert alert-success p-4 shadow">
                <h2 class="mb-3">Booking Confirmed!</h2>
                <p class="lead">Thank you for your reservation.</p>
                <p>Your stay from <strong>{{ check_in }}</strong> to <strong>{{ check_out }}</strong> for <strong>{{ guests }}</strong> guest(s) is confirmed.</p>
                <a href="{{ url_for('guest.dashboard') }}" class="btn btn-primary mt-3">Go to Dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
