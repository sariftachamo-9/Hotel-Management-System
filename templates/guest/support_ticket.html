{% extends 'base.html' %}
{% block content %}
<div class="container-fluid py-5">
    <div class="card" style="max-width: 600px; margin: 40px auto;">
        <div class="card-header">
            <h2 class="mb-0">Contact Support</h2>
        </div>
        <div class="card-body">
            <form method="post" action="">
                <div class="mb-3">
                    <label for="message" class="form-label">Your Message</label>
                    <textarea class="form-control" id="message" name="message" rows="4" required placeholder="Describe your issue or question..."></textarea>
                </div>
                <div class="mb-3">
                    <label for="contact_number" class="form-label">Phone/WhatsApp Number</label>
                    <input type="text" class="form-control" id="contact_number" name="contact_number" value="9862134951" required>
                </div>
                <div class="d-flex justify-content-between align-items-center mt-4">
                    <button type="submit" class="btn btn-primary">Submit Ticket</button>
                    <a href="https://wa.me/9862134951" target="_blank" class="btn btn-success" style="display: flex; align-items: center; gap: 8px;">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" style="width: 22px; height: 22px;"> WhatsApp
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
