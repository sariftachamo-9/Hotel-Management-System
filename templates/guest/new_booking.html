{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">New Booking</h4>
                </div>
                <div class="card-body">
                    {% if selected_offer %}
                        <div class="alert alert-info text-center mb-4">
                            <strong>Selected Offer:</strong> {{ selected_offer }}
                        </div>
                    {% endif %}
                    {% if not has_profile %}
                        <div class="alert alert-warning">
                            Please <a href="{{ url_for('guest.create_profile', next=url_for('guest.new_booking')) }}">complete your guest profile</a> before booking.
                        </div>
                    {% endif %}
                    <form method="POST" action="{{ url_for('guest.new_booking') }}">
                        <div class="mb-3">
                            <label for="room_type_id" class="form-label">Room Type</label>
                            <select class="form-select" id="room_type_id" name="room_type_id" required {% if not has_profile %}disabled{% endif %}>
                                {% for room_type in room_types %}
                                    <option value="{{ room_type.id }}" data-image="{{ room_type_image_urls[room_type.id] if room_type_image_urls and room_type.id in room_type_image_urls else '' }}">
                                        {{ room_type.name }}
                                        {%- if room_type.base_price -%}
                                            &nbsp;&nbsp;|&nbsp;&nbsp;Rs. {{ '%.2f'|format(room_type.base_price) }} / night
                                        {%- endif -%}
                                        {%- set avail = available_counts[room_type.id] if available_counts and room_type.id in available_counts else 0 -%}
                                        &nbsp;&nbsp;|&nbsp;&nbsp;Available: {{ avail }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <div class="card border-0 shadow-sm">
                                <img id="roomTypePreviewImage"
                                     src="{{ room_type_image_urls[room_types[0].id] if room_types and room_type_image_urls and room_types[0].id in room_type_image_urls else 'https://images.unsplash.com/photo-1631049307204-42a792e24d32?q=80&w=1200&auto=format&fit=crop' }}"
                                     alt="Selected room type image"
                                     style="width: 100%; height: 220px; object-fit: cover; border-radius: 12px;">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="check_in" class="form-label">Check-in Date</label>
                            <input type="date" class="form-control" id="check_in" name="check_in" required {% if not has_profile %}disabled{% endif %}>
                        </div>
                        <div class="mb-3">
                            <label for="check_out" class="form-label">Check-out Date</label>
                            <input type="date" class="form-control" id="check_out" name="check_out" required {% if not has_profile %}disabled{% endif %}>
                        </div>
                        <div class="mb-3">
                            <label for="guests" class="form-label">Number of Guests</label>
                            <input type="number" class="form-control" id="guests" name="guests" min="1" value="1" required {% if not has_profile %}disabled{% endif %}>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" {% if not has_profile %}disabled{% endif %}>Proceed to Confirm</button>
                    </form>
                    <script nonce="{{ csp_nonce }}">
                        (function () {
                            const select = document.getElementById('room_type_id');
                            const preview = document.getElementById('roomTypePreviewImage');
                            if (!select || !preview) return;

                            function updatePreview() {
                                const option = select.options[select.selectedIndex];
                                const image = option ? option.getAttribute('data-image') : '';
                                if (image) preview.src = image;
                            }

                            select.addEventListener('change', updatePreview);
                            updatePreview();
                        })();
                    </script>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
