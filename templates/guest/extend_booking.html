{% extends 'base.html' %}
{% block title %}Extend Booking{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Extend Your Booking</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="new_check_out_date" class="form-label">New Check-out Date</label>
                            <input type="date" class="form-control" id="new_check_out_date" name="new_check_out_date" min="{{ booking.check_out_date|safe }}" required>
                            <div class="form-text">Current check-out: {{ booking.check_out_date }}</div>
                        </div>
                        <button type="submit" class="btn btn-success">Extend Booking</button>
                        <a href="{{ url_for('guest.dashboard') }}" class="btn btn-secondary ms-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
