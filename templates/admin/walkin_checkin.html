{% extends "base.html" %}
{% block title %}Walk-in Check-In{% endblock %}
{% block content %}
<div class="container py-4">
    <h2 class="mb-4">Walk-in Guest Check-In</h2>
    <form method="post">
        <div class="mb-3">
            <label for="guest_id" class="form-label">Select Guest</label>
            <select class="form-select" id="guest_id" name="guest_id" required>
                <option value="">Choose...</option>
                {% for guest in guests %}
                <option value="{{ guest.id }}" {% if selected_guest_id == guest.id %}selected{% endif %}>{{ guest.full_name }} ({{ guest.phone }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="room_id" class="form-label">Select Room</label>
            <select class="form-select" id="room_id" name="room_id" required>
                <option value="">Choose...</option>
                {% for room in rooms %}
                <option value="{{ room.id }}">Room {{ room.room_number }} ({{ room.room_type.name }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="num_guests" class="form-label">Number of Guests</label>
            <input type="number" class="form-control" id="num_guests" name="num_guests" min="1" value="1" required>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="check_in_date" class="form-label">Check-In Date</label>
                <input type="date" class="form-control" id="check_in_date" name="check_in_date" value="{{ request.args.get('check_in_date') or '' }}">
            </div>
            <div class="col-md-6 mb-3">
                <label for="check_out_date" class="form-label">Check-Out Date</label>
                <input type="date" class="form-control" id="check_out_date" name="check_out_date" value="{{ request.args.get('check_out_date') or '' }}">
            </div>
        </div>
        <div class="mb-3">
            <label for="special_requests" class="form-label">Special Requests</label>
            <textarea class="form-control" id="special_requests" name="special_requests" rows="2"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Check In Guest</button>
        <a href="{{ url_for('admin.bookings') }}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
